# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d915bdc3b1b08393f68636970989c5e8"
name = "Approvefy"
application_url = "https://approvefy.vercel.app"
embedded = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/api/webhooks/compliance"

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/api/webhooks/compliance"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/api/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_locales,write_app_proxy,write_customers,write_products"

[auth]
redirect_urls = [
  "https://approvefy.vercel.app/auth/callback",
  "https://approvefy.vercel.app/api/auth",
]

[app_proxy]
url = "https://approvefy.vercel.app/api"
subpath = "customer-approval"
prefix = "apps"

[build]
automatically_update_urls_on_dev = true
