# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d915bdc3b1b08393f68636970989c5e8"
name = "Approvefy"
application_url = "https://approvefy.vercel.app/app/pricing"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = [
  "customers/data_request",
  "customers/redact",
  "shop/redact",
]
uri = "https://approvefy.vercel.app/api/webhooks"

[access_scopes]
# Keep in sync with app/lib/app-scopes.server.ts (APP_OAUTH_SCOPES)
# write_online_store_pages — create / publish Customer Registration page (pageCreate)
# write_themes — enable app embed + Registration Form block on theme template
scopes = "read_customers,read_locales,read_online_store_pages,read_themes,write_app_proxy,write_customers,write_online_store_pages,write_products,write_themes"

[auth]
redirect_urls = [
  "https://approvefy.vercel.app/auth/callback",
  "https://approvefy.vercel.app/api/auth"
]

[app_proxy]
url = "https://approvefy.vercel.app/api"
subpath = "customer-approval"
prefix = "apps"
